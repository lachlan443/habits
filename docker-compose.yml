services:
  habits:
    build:
      context: .
      args:
        - VITE_API_URL=/api
    image: habits-tracker
    container_name: habits
    volumes:
      - /home/lach/configs/habits:/config
    ports:
      - "7160:7160"
    environment:
      - NODE_ENV=production
      - PORT=7160
      - DB_PATH=/config/habits.db
      - JWT_SECRET_FILE=/config/jwt_secret.txt
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:7160/api/health', (r) => {process.exit(r.statusCode === 200 ? 0 : 1)})"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 10s
